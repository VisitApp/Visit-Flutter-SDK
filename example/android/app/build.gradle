import org.gradle.api.tasks.bundling.Jar

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

Jar.metaClass.destinationDir = { File dir ->
    delegate.destinationDirectory.set(dir)
}
Jar.metaClass.archiveName = { String name ->
    delegate.archiveFileName.set(name)
}

apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

afterEvaluate {
    tasks.matching { task ->
        task.name.startsWith("compress") && task.name.endsWith("Assets")
    }.configureEach { task ->
        def variantName = task.name.substring("compress".length(), task.name.length() - "Assets".length())
        def copyFlutterAssetsTask = tasks.findByName("copyFlutterAssets${variantName}")
        if (copyFlutterAssetsTask != null) {
            task.dependsOn(copyFlutterAssetsTask)
        }
    }
}

android {
    namespace "com.example.visit_flutter_sdk_example"
    compileSdkVersion 36
    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
        freeCompilerArgs += ['-Xskip-metadata-version-check']
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.visit_flutter_sdk_example"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}
